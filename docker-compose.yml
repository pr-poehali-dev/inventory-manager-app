version: "3.8"

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockbase
      POSTGRES_USER: stockbase
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockbase_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbase"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend API (Python + Flask) ───────────────────────
  backend:
    build:
      context: ./docker/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockbase:${DB_PASSWORD:-stockbase_secret}@db:5432/stockbase
      DB_SCHEMA: public
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend (Vite build + Nginx) ─────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
